<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxel Studio — Sign In</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/scope-overlay.css">
</head>
<body>

  <main class="auth-page fade-in">
    <a href="auth.html" class="auth-logo-link">
      <img src="img/boxel-logo.png" alt="Boxel Studio" class="auth-logo">
    </a>

    <!-- View container: JS swaps between login / forgot / reset views -->
    <div id="auth-view">

      <!-- LOGIN VIEW -->
      <div class="auth-card" id="login-view" data-scope-id="auth-login-form">
        <div class="auth-card-gradient"></div>
        <div class="auth-card-body">
          <h2 class="auth-title">Sign In to Your Account</h2>
          <p class="auth-subtitle">Access the Boxel Quoting Tool</p>

          <div class="auth-error" id="auth-error" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="auth-error-text">Invalid email or password.</span>
          </div>

          <form id="login-form" autocomplete="on">
            <div class="input-group">
              <label class="input-label" for="login-email">Email or Username</label>
              <input type="text" id="login-email" name="username" placeholder="specialist@boxel.com" autocomplete="username" required>
            </div>

            <div class="input-group">
              <label class="input-label" for="login-password">Password</label>
              <div class="input-password-wrap">
                <input type="password" id="login-password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('login-password', this)" aria-label="Show password">
                  <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-secondary btn-full">Sign In</button>
          </form>

          <button class="auth-forgot-link" onclick="showView('forgot-step1')">Forgot password?</button>
        </div>
      </div>

    </div>

    <p class="auth-footer">Provisioned by your studio administrator</p>
  </main>

  <!-- FORGOT PASSWORD — STEP 1: Enter Email -->
  <template id="tpl-forgot-step1">
    <div class="auth-card" id="forgot-step1-view">
      <div class="auth-card-gradient"></div>
      <div class="auth-card-body">
        <h2 class="auth-title">Reset Your Password</h2>
        <p class="auth-subtitle">Enter the email associated with your account and we'll send reset instructions.</p>

        <form id="forgot-form">
          <div class="input-group">
            <label class="input-label" for="forgot-email">Email Address</label>
            <input type="email" id="forgot-email" placeholder="specialist@boxel.com" required>
          </div>
          <button type="submit" class="btn btn-secondary btn-full">Send Reset Link</button>
        </form>

        <button class="auth-back-link" onclick="showView('login')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
          Back to Sign In
        </button>
      </div>
    </div>
  </template>

  <!-- FORGOT PASSWORD — STEP 2: Check Email -->
  <template id="tpl-forgot-step2">
    <div class="auth-card" id="forgot-step2-view">
      <div class="auth-card-gradient"></div>
      <div class="auth-card-body auth-card-body-centered">
        <div class="auth-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <h2 class="auth-title">Check Your Email</h2>
        <p class="auth-subtitle">We sent password reset instructions to <strong id="masked-email"></strong></p>
        <p class="auth-hint">Didn't receive it? Check your spam folder or request a new link.</p>

        <button class="btn btn-outline btn-full" onclick="handleResend()">Resend Link</button>

        <button class="auth-back-link" onclick="showView('login')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
          Back to Sign In
        </button>
      </div>
    </div>
  </template>

  <!-- FORGOT PASSWORD — STEP 3: New Password -->
  <template id="tpl-reset-password">
    <div class="auth-card" id="reset-view">
      <div class="auth-card-gradient"></div>
      <div class="auth-card-body">
        <h2 class="auth-title">Create New Password</h2>
        <p class="auth-subtitle">Enter and confirm your new password.</p>

        <form id="reset-form">
          <div class="input-group">
            <label class="input-label" for="reset-password">New Password</label>
            <div class="input-password-wrap">
              <input type="password" id="reset-password" placeholder="Enter new password" autocomplete="new-password" required>
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility('reset-password', this)" aria-label="Show password">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="password-feedback" id="reset-feedback" style="display:none">
            <div class="password-strength-row">
              <span class="password-strength-label-text">Password strength:</span>
              <span class="password-strength-level" id="reset-strength-level">WEAK</span>
            </div>
            <div class="password-strength-bar">
              <div class="password-strength-fill" id="reset-strength-fill"></div>
            </div>
            <ul class="password-rules" id="reset-rules">
              <li class="password-rule" data-rule="length"><span class="rule-icon"></span> At least 8 characters</li>
              <li class="password-rule" data-rule="uppercase"><span class="rule-icon"></span> One uppercase letter</li>
              <li class="password-rule" data-rule="number"><span class="rule-icon"></span> One number</li>
              <li class="password-rule" data-rule="special"><span class="rule-icon"></span> One special character</li>
            </ul>
          </div>

          <div class="input-group">
            <label class="input-label" for="reset-confirm">Confirm Password</label>
            <div class="input-password-wrap">
              <input type="password" id="reset-confirm" placeholder="Confirm new password" autocomplete="new-password" required>
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility('reset-confirm', this)" aria-label="Show password">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="password-match" id="reset-match" style="display:none"></div>
          </div>

          <button type="submit" class="btn btn-secondary btn-full" id="reset-submit" disabled>Reset Password</button>
        </form>
      </div>
    </div>
  </template>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scope-data.js"></script>
  <script src="js/scope-overlay.js"></script>
</body>
</html>
