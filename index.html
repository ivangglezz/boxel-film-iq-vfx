<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxel Studio — Upload Scripts</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/upload.css">
  <link rel="stylesheet" href="css/scope-overlay.css">
</head>
<body>
  <div id="app-navbar"></div>

  <main class="upload-page fade-in">
    <div class="upload-header">
      <h1>Upload Scripts</h1>
      <p>Drop your screenplays and let AI generate production proposals</p>
    </div>

    <div class="upload-zones">
      <!-- Local Upload -->
      <div class="upload-zone" id="upload-local">
        <svg class="upload-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17,8 12,3 7,8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="upload-zone-title">Upload Scripts</span>
        <span class="upload-zone-subtitle">Drag & drop or click to browse — PDF, FDX, TXT</span>
        <input type="file" id="file-input" multiple accept=".pdf,.fdx,.txt,.fountain" style="display:none">
      </div>

      <!-- Google Drive -->
      <div class="upload-zone" id="upload-gdrive">
        <svg class="upload-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 19.5h20L12 2z"/>
          <path d="M8.5 19.5L15.5 7"/>
          <path d="M15.5 19.5L8.5 7"/>
          <line x1="2" y1="19.5" x2="22" y2="19.5"/>
        </svg>
        <span class="upload-zone-title">Google Drive</span>
        <span class="upload-zone-subtitle">Paste a Google Drive folder URL</span>
        <div class="gdrive-input-wrap">
          <input type="url" id="gdrive-url" placeholder="https://drive.google.com/drive/folders/...">
        </div>
      </div>
    </div>

    <div id="file-list" class="file-list"></div>

    <div id="process-section" class="process-section" style="display:none">
      <button class="btn btn-secondary" onclick="processScripts()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        PROCESS SCRIPTS
      </button>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/scope-data.js"></script>
  <script src="js/scope-overlay.js"></script>
</body>
</html>
