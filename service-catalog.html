<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxel Studio — Service Catalog</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/service-catalog.css">
  <link rel="stylesheet" href="css/scope-overlay.css">
</head>
<body>
  <div id="app-navbar"></div>

  <main class="svc-page fade-in">
    <!-- Header -->
    <div class="svc-header">
      <div class="svc-header-left">
        <h1 class="svc-title">Service Catalog</h1>
        <p class="svc-subtitle">Manage your studio's VFX services and pricing</p>
      </div>
      <div class="svc-header-right">
        <div class="svc-stats">
          <div class="svc-stat">
            <span class="svc-stat-value" id="stat-services">0</span>
            <span class="svc-stat-label">SERVICES</span>
          </div>
          <div class="svc-stat">
            <span class="svc-stat-value" id="stat-groups">0</span>
            <span class="svc-stat-label">GROUPS</span>
          </div>
        </div>
        <div class="svc-actions">
          <button class="btn btn-outline btn-sm" onclick="openGroupModal()" data-scope-id="svc-add-btn-group">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ADD GROUP
          </button>
          <button class="btn btn-secondary btn-sm" onclick="openServiceModal()" data-scope-id="svc-add-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ADD SERVICE
          </button>
        </div>
      </div>
    </div>

    <!-- Service Groups Container -->
    <div class="svc-groups-container" id="svc-groups-container" data-scope-id="svc-catalog-list">
      <!-- Rendered by JS -->
    </div>

    <!-- Empty State -->
    <div class="svc-empty" id="svc-empty" style="display:none">
      <svg class="svc-empty-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      <p class="svc-empty-title">No services in the catalog yet</p>
      <p class="svc-empty-desc">Add your first VFX service to start building your studio's pricing catalog.</p>
      <button class="btn btn-secondary" onclick="openServiceModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ADD YOUR FIRST SERVICE
      </button>
    </div>
  </main>

  <!-- Add/Edit Service Modal -->
  <div class="modal-overlay" id="service-modal">
    <div class="modal svc-modal">
      <h3 class="modal-title" id="service-modal-title">Add New Service</h3>
      <form id="service-form">
        <div class="input-group">
          <label class="input-label" for="svc-name">Service Name</label>
          <input type="text" id="svc-name" placeholder="e.g., 3D Character Animation" required>
        </div>
        <div class="input-group">
          <label class="input-label" for="svc-desc">Description</label>
          <textarea id="svc-desc" placeholder="Full character rigging and keyframe/mocap animation for CG characters..." rows="3"></textarea>
        </div>
        <div class="svc-form-row">
          <div class="input-group">
            <label class="input-label" for="svc-price">Base Price (USD)</label>
            <div class="input-price-wrap">
              <span class="input-price-prefix">$</span>
              <input type="number" id="svc-price" placeholder="12,500" min="0" step="50" required>
            </div>
          </div>
          <div class="input-group" data-scope-id="svc-assign-group">
            <label class="input-label" for="svc-group">Service Group</label>
            <select id="svc-group" class="svc-select">
              <option value="">Uncategorized</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal('service-modal')">Cancel</button>
          <button type="submit" class="btn btn-secondary btn-sm">Save</button>
        </div>
        <input type="hidden" id="svc-edit-id" value="">
      </form>
    </div>
  </div>

  <!-- Add/Edit Group Modal -->
  <div class="modal-overlay" id="group-modal">
    <div class="modal svc-modal svc-modal-sm">
      <h3 class="modal-title" id="group-modal-title">Add New Group</h3>
      <form id="group-form">
        <div class="input-group">
          <label class="input-label" for="grp-name">Group Name</label>
          <input type="text" id="grp-name" placeholder="e.g., Animation" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal('group-modal')">Cancel</button>
          <button type="submit" class="btn btn-secondary btn-sm">Save</button>
        </div>
        <input type="hidden" id="grp-edit-id" value="">
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal svc-modal svc-modal-delete">
      <div class="delete-icon-ring">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h3 class="delete-title" id="delete-modal-title">Delete Service?</h3>
      <p class="delete-desc" id="delete-modal-desc">Are you sure? This action cannot be undone.</p>
      <div class="delete-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
        <button type="button" class="btn delete-btn-confirm" id="delete-confirm-btn" onclick="confirmDelete()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Delete
        </button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/service-catalog.js"></script>
  <script src="js/scope-data.js"></script>
  <script src="js/scope-overlay.js"></script>
</body>
</html>
