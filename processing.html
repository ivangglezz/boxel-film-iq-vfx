<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxel Studio — Analyzing Screenplay</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/processing.css">
  <link rel="stylesheet" href="css/scope-overlay.css">
</head>
<body>
  <div id="app-navbar"></div>

  <main class="processing-page fade-in">
    <!-- Summary (hidden until phase 4, shown at the top) -->
    <div class="processing-summary" id="summary">
      <div class="summary-stats" id="summary-stats"></div>
      <div class="summary-actions" id="summary-actions" style="display:none;">
        <a href="catalog.html" class="btn btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
          </svg>
          VIEW PROPOSALS
        </a>
      </div>
    </div>

    <!-- Header -->
    <div class="processing-header">
      <div class="processing-header-left">
        <h1>Analyzing Screenplay</h1>
        <div class="processing-file-badge" id="file-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
          </svg>
          <span id="file-badge-name">screenplay.pdf</span>
        </div>
      </div>
      <!-- Progress Bar inline in header -->
      <div class="processing-progress">
        <div class="processing-progress-bar">
          <div class="processing-progress-fill" id="progress-fill"></div>
        </div>
        <div class="processing-progress-label">
          <span id="progress-status">Initializing...</span>
          <span class="processing-progress-percent" id="progress-percent">0%</span>
        </div>
      </div>
    </div>

    <!-- Body: Two Columns -->
    <div class="processing-body">
      <!-- Left: Timeline + Terminal -->
      <div class="processing-left">
        <!-- Phase Timeline -->
        <div class="phase-timeline">
          <div class="phase-step" id="phase-1">
            <div class="phase-dot"></div>
            <div class="phase-info">
              <span class="phase-label">Script Analysis</span>
              <span class="phase-counter" id="phase-1-counter"></span>
            </div>
          </div>
          <div class="phase-step" id="phase-2">
            <div class="phase-dot"></div>
            <div class="phase-info">
              <span class="phase-label">Scene Detection</span>
              <span class="phase-counter" id="phase-2-counter"></span>
            </div>
          </div>
          <div class="phase-step" id="phase-3">
            <div class="phase-dot"></div>
            <div class="phase-info">
              <span class="phase-label">Character Detection</span>
              <span class="phase-counter" id="phase-3-counter"></span>
            </div>
          </div>
          <div class="phase-step" id="phase-4">
            <div class="phase-dot"></div>
            <div class="phase-info">
              <span class="phase-label">Environment Detection</span>
              <span class="phase-counter" id="phase-4-counter"></span>
            </div>
          </div>
          <div class="phase-step" id="phase-5">
            <div class="phase-dot"></div>
            <div class="phase-info">
              <span class="phase-label">Opportunity Detection</span>
              <span class="phase-counter" id="phase-5-counter"></span>
            </div>
          </div>
          <div class="phase-step" id="phase-6">
            <div class="phase-dot"></div>
            <div class="phase-info">
              <span class="phase-label">Complete</span>
              <span class="phase-counter" id="phase-6-counter"></span>
            </div>
          </div>
        </div>

        <!-- Terminal -->
        <div class="processing-terminal" id="terminal"></div>
      </div>

      <!-- Right: Scene Cards + Summary -->
      <div class="processing-right">
        <div class="discovered-scenes-header" id="scenes-header" style="display:none;">
          <span>Discovered</span>
          <div class="discovered-tabs" id="discovered-tabs">
            <button class="discovered-tab active" data-tab="scenes">Scenes <span class="discovered-tab-count" id="tab-count-scenes">0</span></button>
            <button class="discovered-tab" data-tab="characters">Chars <span class="discovered-tab-count" id="tab-count-characters">0</span></button>
            <button class="discovered-tab" data-tab="environments">Envs <span class="discovered-tab-count" id="tab-count-environments">0</span></button>
          </div>
        </div>
        <div class="discovered-scenes" id="scenes-container"></div>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/processing.js"></script>
  <script src="js/scope-data.js"></script>
  <script src="js/scope-overlay.js"></script>
</body>
</html>
